<header>
    <div class="header-logo">
        <a routerLink="/"><h1>NextShape</h1></a>
    </div>
    <div class="header-icons">
        <a href="#"><img class="icon" src="assets/icons/search.svg" alt="Pesquisar"></a>
        <a href="#"><img class="icon" src="assets/icons/cart.svg" alt="Carrinho"></a>
        <a routerLink="/perfil"><img class="icon" src="assets/icons/user.svg" alt="Perfil"></a>
    </div>
</header>

<main class="area-login">
    <h2 class="titulo-acesso">MEU PERFIL</h2>
    <div class="forms-login">
        
        <!-- Boas-vindas -->
        <h3 style="color: white; margin-bottom: 0;">Olá, {{ usuario?.nome }}</h3>
        <p style="color: #ccc; margin-top: 0; font-size: 14px;">{{ usuario?.email }}</p>

        <hr style="width: 100%; border-color: #333;">

        <!-- Área de Alterar Senha -->
        <input type="password" [(ngModel)]="novaSenha" class="input-login" placeholder="Digite uma nova senha">
        <button type="button" class="botao fazer-login" style="width: 100%; max-width: 100%;" (click)="alterarSenha()">Atualizar Senha</button>
        
        <p [class]="tipoMensagem || 'mensagem-oculta'">{{ mensagem }}</p>

        <hr style="width: 100%; border-color: #333;">

        <!-- Botões de Exclusão e Logout -->
        <div style="display: flex; gap: 10px; width: 100%;">
            <button type="button" class="botao" style="background-color: #ff4d4d; color: white; width: 50%; max-width: none;" (click)="deletarConta()">Deletar Conta</button>
            <button type="button" class="botao" style="width: 50%; max-width: none;" (click)="sair()">Sair</button>
        </div>

    </div>
</main>
