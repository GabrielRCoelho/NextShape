<header>
    <div class="header-logo">
        <a routerLink="/login">
            <h1>NextShape</h1>
        </a>
    </div>
    <div class="header-icons">
        <a href="#"><img class="icon" src="assets/icons/search.svg" alt="Pesquisar"></a>
        <a href="#"><img class="icon" src="assets/icons/cart.svg" alt="Carrinho"></a>
        <a routerLink="/login"><img class="icon" src="assets/icons/user.svg" alt="Login"></a>
    </div>
</header>

<main class="area-login">
    <h2 class="titulo-acesso">CRIAR NOVA CONTA</h2>
    
    <form class="forms-login">
        <input type="text" name="nome" [(ngModel)]="nome" class="input-login" placeholder="Nome Completo">
        
        <input type="email" name="email" [(ngModel)]="email" class="input-login" placeholder="E-mail">
        
        <input type="password" name="senha" [(ngModel)]="senha" class="input-login" placeholder="Senha">
        
        <input type="password" name="confirmarSenha" [(ngModel)]="confirmarSenha" class="input-login" placeholder="Confirmar Senha">
        
        <p [class]="tipoMensagem || 'mensagem-oculta'">{{ mensagem }}</p>
        
        <button type="button" class="botao fazer-login" (click)="cadastrar()">Cadastrar</button>
        <button type="button" class="botao" routerLink="/login">Voltar ao Login</button>
    </form>
</main>
