<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.login.css">
    <script src="Script.cadastro.js" defer></script>
    <title>NextShape - Criar Conta</title>
</head>

<body>
    <header>
        <div class="header-logo">
            <a href="Index.html">
                <h1>NextShape</h1>
            </a>
        </div>
        <div class="header-icons">
            <a href="#"><img class="icon" src="assets/icons/search.svg" alt="Pesquisar"></a>
            <a href="#"><img class="icon" src="assets/icons/cart.svg" alt="Carrinho"></a>
            <a href="login.html"><img class="icon" src="assets/icons/user.svg" alt="Login"></a>
        </div>
    </header>
    
    <main class="area-login">
        <h2 class="titulo-acesso">CRIAR NOVA CONTA</h2>
        <form class="forms-login">
            <input type="text" id="nome" class="input-login" placeholder="Nome Completo">
            <input type="email" id="email" class="input-login" placeholder="E-mail">
            <input type="password" id="senha" class="input-login" placeholder="Senha">
            <input type="password" id="confirmar-senha" class="input-login" placeholder="Confirmar Senha">
            
            <p id="mensagem-alerta" class="mensagem-oculta"></p>
            
            <button type="button" id="btn-cadastrar" class="botao fazer-login">Cadastrar</button>
            <button type="button" id="btn-voltar" class="botao">Voltar ao Login</button>
        </form>
    </main>
</body>

</html>
